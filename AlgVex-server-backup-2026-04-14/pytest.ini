[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --ignore=tests/test_binance_patch.py --ignore=tests/test_bracket_order.py --ignore=tests/test_command_listener.py --ignore=tests/test_implementation_plan.py --ignore=tests/test_integration_mock.py --ignore=tests/test_multi_agent.py --ignore=tests/test_orderbook.py --ignore=tests/test_rounding_fix.py --ignore=tests/test_sl_fix.py --ignore=tests/test_strategy_components.py --ignore=tests/test_telegram.py --ignore=tests/test_telegram_commands.py
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
