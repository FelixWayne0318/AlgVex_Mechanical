# GitHub Actions 工作流: 智能提交分析
#
# 触发时机:
# 1. 每次 PR 创建/更新 (节省分钟: 不在每次 push 触发)
# 2. 手动触发
#
# 功能:
# 1. smart_commit_analyzer.py - 自动演进的回归检测 (规则自动从 git 生成)
# 2. analyze_dependencies.py - Python AST 依赖分析 (循环依赖、缺失模块检测)
# 3. check_logic_sync.py - SSoT 逻辑同步检测 (检测副本是否与源一致)
#
# 相关工作流:
# - codeql-analysis.yml - CodeQL 安全和代码质量分析 (每周运行)

name: Commit Analysis

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      commits_to_analyze:
        description: '分析提交数量'
        required: false
        default: '100'
        type: string

jobs:
  # =========================================================================
  # 合并为单个 job (节省 runner 启动开销, 原来 3 个 job 各需 ~30s 启动)
  # =========================================================================
  analyze:
    name: Regression & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- Smart Regression Detection ---
      - name: Run smart_commit_analyzer.py
        id: regression
        run: |
          python3 scripts/smart_commit_analyzer.py \
            --commits ${{ github.event.inputs.commits_to_analyze || '100' }} \
            --json > smart_analysis.json 2>&1 || true

          TOTAL=$(python3 -c "import json; d=json.load(open('smart_analysis.json')); print(d.get('update', {}).get('total_rules', 0))" 2>/dev/null || echo "0")
          PASSED=$(python3 -c "import json; d=json.load(open('smart_analysis.json')); print(d.get('validation', {}).get('passed', 0))" 2>/dev/null || echo "0")
          FAILED=$(python3 -c "import json; d=json.load(open('smart_analysis.json')); print(d.get('validation', {}).get('failed', 0))" 2>/dev/null || echo "0")
          WARNINGS=$(python3 -c "import json; d=json.load(open('smart_analysis.json')); print(d.get('validation', {}).get('warnings', 0))" 2>/dev/null || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      # --- Dependency Analysis ---
      - name: Run dependency analysis
        id: deps
        run: |
          python3 scripts/analyze_dependencies.py --json > dependency_analysis.json 2>&1 || true

          CIRCULAR=$(python3 -c "import json; d=json.load(open('dependency_analysis.json')); print(d.get('summary', {}).get('circular_dependencies', 0))" 2>/dev/null || echo "0")
          MISSING=$(python3 -c "import json; d=json.load(open('dependency_analysis.json')); print(d.get('summary', {}).get('missing_modules', 0))" 2>/dev/null || echo "0")

          echo "circular=$CIRCULAR" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

      # --- Logic Sync Check (SSoT) ---
      - name: Run check_logic_sync.py
        id: sync
        run: |
          python3 scripts/check_logic_sync.py --json > logic_sync.json 2>&1 || true

          SYNC_PASSED=$(python3 -c "import json; d=json.load(open('logic_sync.json')); print(d.get('passed', 0))" 2>/dev/null || echo "0")
          SYNC_FAILED=$(python3 -c "import json; d=json.load(open('logic_sync.json')); print(d.get('failed', 0))" 2>/dev/null || echo "0")

          echo "passed=$SYNC_PASSED" >> $GITHUB_OUTPUT
          echo "failed=$SYNC_FAILED" >> $GITHUB_OUTPUT

      # --- Generate Summary ---
      - name: Generate summary
        run: |
          echo "## 🔍 Commit Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Regression Detection" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📋 Total Rules | ${{ steps.regression.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | ${{ steps.regression.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${{ steps.regression.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Warnings | ${{ steps.regression.outputs.warnings }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dependency Analysis" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Circular Dependencies | ${{ steps.deps.outputs.circular }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Missing Modules | ${{ steps.deps.outputs.missing }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Logic Sync (SSoT)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Synced | ${{ steps.sync.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Stale | ${{ steps.sync.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            smart_analysis.json
            dependency_analysis.json
            logic_sync.json
            configs/auto_generated_rules.json

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.regression.outputs.total }}';
            const passed = '${{ steps.regression.outputs.passed }}';
            const failed = '${{ steps.regression.outputs.failed }}';
            const circular = '${{ steps.deps.outputs.circular }}';
            const missing = '${{ steps.deps.outputs.missing }}';
            const syncPassed = '${{ steps.sync.outputs.passed }}';
            const syncFailed = '${{ steps.sync.outputs.failed }}';

            let status = (failed > 0 || circular > 0 || missing > 0 || syncFailed > 0) ? '⚠️' : '✅';
            let body = `## ${status} Commit Analysis\n\n`;
            body += `### Regression Detection\n`;
            body += `| Metric | Count |\n|--------|-------|\n`;
            body += `| 📋 Total Rules | ${total} |\n`;
            body += `| ✅ Passed | ${passed} |\n`;
            body += `| ❌ Failed | ${failed} |\n\n`;
            body += `### Dependency Analysis\n`;
            body += `| 🔄 Circular | ${circular} | ❌ Missing | ${missing} |\n\n`;
            body += `### Logic Sync (SSoT)\n`;
            body += `| 🔗 Synced | ${syncPassed} | ❌ Stale | ${syncFailed} |\n`;

            if (failed > 0) {
              body += `\n⚠️ **Potential Regressions Detected**: Please review the workflow summary.`;
            }
            if (syncFailed > 0) {
              body += `\n⚠️ **Stale Logic Clones Detected**: SSoT duplicates are out of sync.`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
