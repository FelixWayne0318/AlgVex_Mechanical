# configs/production.yaml
# 生产环境配置覆盖

capital:
  leverage: 10                    # 生产环境杠杆 (10x + ratio=12%, 最小单多层DCA测试)

timing:
  timer_interval_sec: 1200        # 20分钟

logging:
  level: "INFO"

network:
  instrument_discovery:
    max_retries: 180              # 增加到 180 秒 (3 分钟)
    retry_interval: 1.0

